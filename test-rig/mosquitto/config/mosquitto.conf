# Mosquitto config for the NotifyBridge test rig.
# Lab-grade: anonymous, plaintext. Tighten for any non-lab use.

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ─────────────────────────────────────────────────────────────────────────────
# TLS path (opt-in) — uncomment to test SYSTEM_CA / Pinned modes.
# Generate a self-signed cert into mosquitto/config/certs/ first (see
# README-testing.md → "TLS path"). require_certificate=false keeps the client
# (the phone) from needing to present a cert; the app only validates the server.
#
# listener 8883
# allow_anonymous true
# cafile     /mosquitto/config/certs/server.crt
# certfile   /mosquitto/config/certs/server.crt
# keyfile    /mosquitto/config/certs/server.key
# require_certificate false
# ─────────────────────────────────────────────────────────────────────────────

# Authenticated path (opt-in) — flip allow_anonymous to false and provide a
# password_file. Create it with:
#   docker exec -it nb-mosquitto mosquitto_passwd -c /mosquitto/config/passwd nb
# Then in the app's Broker Setup, set Username = nb, Password = <what you set>.
#
# allow_anonymous false
# password_file /mosquitto/config/passwd
