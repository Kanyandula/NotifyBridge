name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Wrapper validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build-and-test:
    name: Build, unit tests, detekt, lint
    runs-on: ubuntu-latest
    needs: validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Build + unit tests + quality gate
        run: ./gradlew assembleDebug testDebugUnitTest detekt lintDebug --continue --stacktrace --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/detekt/detekt.html
            app/build/reports/detekt/detekt.xml
            app/build/reports/detekt/detekt.sarif
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/*.xml
          if-no-files-found: ignore
          retention-days: 14

  assemble-release:
    name: Assemble release APK
    runs-on: ubuntu-latest
    needs: validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble release
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
